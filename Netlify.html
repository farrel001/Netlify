<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title> Farrel Viewer</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    background: #000;
    overflow: hidden;
}

/* Container fullscreen */
.viewer {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #000;
}

/* Web view */
iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* Top bar clean */
.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 35px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    color: white;
    font-size: 13px;
    z-index: 10;
}

/* Fake status */
.status-left {
    opacity: 0.8;
}

.status-right {
    display: flex;
    gap: 6px;
    opacity: 0.8;
}

/* Bottom bar */
.bottombar {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 55px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 10;
}

/* tombol */
.btn {
    color: white;
    font-size: 20px;
    cursor: pointer;
    transition: 0.2s;
}

.btn:active {
    transform: scale(0.85);
    opacity: 0.6;
}

/* Home indicator */
.home-indicator {
    position: fixed;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 5px;
    background: rgba(255,255,255,0.7);
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="viewer">

    <!-- Top bar -->
    <div class="topbar">
        <div class="status-left">09:41</div>
        <div class="status-right">
            📶 🔋
        </div>
    </div>

    <!-- Web -->
    <iframe id="web" src="https://www.bing.com"></iframe>

    <!-- Bottom bar -->
    <div class="bottombar">
        <div class="btn" onclick="goBack()">◀</div>
        <div class="btn" onclick="reload()">⟳</div>
        <div class="btn" onclick="goForward()">▶</div>
    </div>

    <!-- Home bar -->
    <div class="home-indicator"></div>

</div>

<script>
let frame = document.getElementById("web");

function goBack() {
    frame.contentWindow.history.back();
}

function goForward() {
    frame.contentWindow.history.forward();
}

function reload() {
    frame.contentWindow.location.reload();
}
</script>

</body>
</html>

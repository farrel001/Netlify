<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Runner</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    background: #0f0f0f;
    color: white;
}

/* Top bar */
.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 50px;
    background: rgba(20,20,20,0.6);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    z-index: 10;
}

/* Button execute */
.run-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-weight: bold;
}

.run-btn:active {
    transform: scale(0.9);
}

/* Textarea */
.editor {
    position: fixed;
    top: 50px;
    width: 100%;
    height: calc(100% - 50px);
    background: #0f0f0f;
}

textarea {
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: white;
    padding: 15px;
    font-size: 14px;
    resize: none;
}

/* Output iframe */
.output {
    position: fixed;
    top: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* Exit button */
.exit {
    position: fixed;
    top: 10px;
    right: 15px;
    z-index: 20;
    color: white;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- Topbar -->
<div class="topbar">
    <div>HTML Runner</div>
    <div class="run-btn" onclick="runCode()">U</div>
</div>

<!-- Editor -->
<div class="editor">
<textarea id="code" placeholder="Masukkan HTML di sini...">
<h1 style="color:white;text-align:center;margin-top:50%;">Halo Dunia</h1>
</textarea>
</div>

<!-- Output -->
<div class="output" id="output">
    <div class="exit" onclick="closeOutput()">✕</div>
    <iframe id="frame"></iframe>
</div>

<script>
function runCode() {
    let code = document.getElementById("code").value;
    let frame = document.getElementById("frame");

    frame.srcdoc = code;
    document.getElementById("output").style.display = "block";
}

function closeOutput() {
    document.getElementById("output").style.display = "none";
}
</script>

</body>
</html>
